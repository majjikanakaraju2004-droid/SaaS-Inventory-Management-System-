<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="120" cy="120" r="120" fill="#080B11"/>
  
  <!-- Inner gradient circle -->
  <circle cx="120" cy="120" r="110" fill="url(#logoGradient)" opacity="0.15"/>
  
  <!-- Center hexagon representing "system" -->
  <path d="M 120 50 L 160 70 L 160 110 L 120 130 L 80 110 L 80 70 Z" fill="none" stroke="url(#logoGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Three data nodes (real-time sync indicator) -->
  <circle cx="90" cy="85" r="8" fill="url(#accentGradient)"/>
  <circle cx="120" cy="70" r="8" fill="url(#logoGradient)"/>
  <circle cx="150" cy="85" r="8" fill="url(#logoGradient)"/>
  
  <!-- Connection lines (real-time streaming) -->
  <line x1="90" y1="85" x2="120" y2="70" stroke="url(#logoGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="70" x2="150" y2="85" stroke="url(#logoGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="85" x2="120" y2="120" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="120" x2="90" y2="85" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Lower inventory bar nodes -->
  <rect x="75" y="135" width="12" height="28" rx="2" fill="url(#logoGradient)" opacity="0.8"/>
  <rect x="104" y="125" width="12" height="38" rx="2" fill="url(#accentGradient)"/>
  <rect x="133" y="135" width="12" height="28" rx="2" fill="url(#logoGradient)" opacity="0.8"/>
  
  <!-- Pulse rings (real-time indicator) -->
  <circle cx="120" cy="120" r="145" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="120" cy="120" r="155" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.15"/>
  
  <!-- Corner accents -->
  <circle cx="40" cy="40" r="3" fill="url(#accentGradient)"/>
  <circle cx="200" cy="40" r="3" fill="url(#accentGradient)"/>
  <circle cx="40" cy="200" r="3" fill="url(#logoGradient)"/>
  <circle cx="200" cy="200" r="3" fill="url(#logoGradient)"/>
</svg>
